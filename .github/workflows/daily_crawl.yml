name: Daily Outdoor Activity Crawl

on:
  schedule:
    # 每天北京时间 08:00 触发（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 支持手动触发，方便调试

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        working-directory: crawler
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VOLC_API_KEY:         ${{ secrets.VOLC_API_KEY }}
          VOLC_MODEL:           doubao-pro-32k
        run: python main.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "爬虫任务失败，请检查 Actions 日志"
          # 可在此接入大象/邮件通知
